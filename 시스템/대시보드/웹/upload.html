<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>📎 첨부 & 전송</title>
  <style>
    :root { --bg:#0e1117; --panel:#161b22; --line:#2a3140; --text:#e6edf3; --muted:#8b949e; --accent:#6e9bff; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font:15px/1.5 -apple-system,system-ui,sans-serif; padding:18px; }
    h1 { font-size:18px; margin:0 0 4px; }
    .sub { color:var(--muted); font-size:13px; margin-bottom:16px; }
    label { display:block; font-size:13px; color:var(--muted); margin:14px 0 6px; }
    input[type=file], textarea { width:100%; background:var(--panel); color:var(--text); border:1px solid var(--line); border-radius:8px; padding:11px; font:inherit; }
    textarea { min-height:80px; resize:vertical; }
    button { width:100%; margin-top:18px; padding:14px; font-size:16px; font-weight:600; border:none; border-radius:10px; background:var(--accent); color:#0b1020; cursor:pointer; }
    button:disabled { opacity:.6; }
    #log { margin-top:16px; padding:12px; border-radius:8px; font-size:14px; min-height:20px; }
    #log.ok { background:#11271a; color:#7ee2a8; }
    #log.err { background:#2a1414; color:#ffb4b4; }
    .files { margin-top:8px; font-size:12px; color:var(--muted); }
  </style>
</head>
<body>
  <h1>📎 첨부 &amp; 전송</h1>
  <div class="sub" id="space-line"></div>
  <p class="sub">홈 화면 앱에서 파일 첨부가 막힐 때 쓰는 Safari 경량 페이지입니다. 파일을 올리고 전송하면 대화방에 미리보기로 뜹니다.</p>

  <label>파일 선택 (여러 개 가능)</label>
  <input type="file" id="file" multiple>
  <label>메시지 (선택)</label>
  <textarea id="text" placeholder="함께 보낼 메시지"></textarea>
  <button id="send" type="button">전송</button>
  <div id="log"></div>
  <button id="close" type="button" style="display:none;background:#30363d;color:var(--text);">닫기 (앱으로 돌아가기)</button>

  <script>
    const params = new URLSearchParams(location.search);
    const space = params.get("space") || "";
    document.getElementById("space-line").textContent = space ? ("공간: " + space) : "⚠ 공간 정보가 없습니다";
    const logEl = document.getElementById("log");
    const log = (msg, cls) => { logEl.textContent = msg; logEl.className = cls || ""; };

    document.getElementById("send").onclick = async () => {
      const files = [...document.getElementById("file").files];
      const text = document.getElementById("text").value.trim();
      if (!space) { log("공간 정보가 없어 전송할 수 없습니다.", "err"); return; }
      if (!files.length && !text) { log("파일이나 메시지를 넣어주세요.", "err"); return; }
      const btn = document.getElementById("send");
      btn.disabled = true;
      try {
        const paths = [];
        for (let i = 0; i < files.length; i++) {
          log(`업로드 중... (${i + 1}/${files.length})`);
          const fd = new FormData();
          fd.append("file", files[i]);
          fd.append("dir", "공간/" + space + "/inbox");
          const r = await fetch("/api/files/upload", { method: "POST", body: fd });
          if (!r.ok) { let d; try { d = (await r.json()).detail; } catch (_) {} throw new Error(d || ("업로드 실패 " + r.status)); }
          paths.push((await r.json()).path);
        }
        log("전송 중...");
        const body = [text].concat(paths).filter(Boolean).join("\n");
        const pr = await fetch("/api/spaces/" + encodeURIComponent(space) + "/post", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text: body, requester: "대표", run_manager: true, client_message_id: "" }),
        });
        if (!pr.ok) { let d; try { d = (await pr.json()).detail; } catch (_) {} throw new Error(d || ("전송 실패 " + pr.status)); }
        log("✅ 전송 완료! 홈 화면 앱(대화방)으로 돌아가면 첨부가 보입니다.", "ok");
        document.getElementById("file").value = "";
        document.getElementById("text").value = "";
        document.getElementById("close").style.display = "block";
      } catch (e) {
        log("실패: " + e.message, "err");
      }
      btn.disabled = false;
    };

    document.getElementById("close").onclick = () => {
      window.close();                       // window.open으로 열린 창은 스스로 닫힌다
      log("이 탭을 닫고 홈 화면 앱으로 돌아가세요.", "ok");
    };
  </script>
</body>
</html>
