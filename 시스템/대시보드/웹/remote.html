<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>화면 제어 세션 — CnvAgentWorld</title>
  <!-- 대시보드와 같은 테마(라이트/다크) 적용 -->
  <script>
    (function () {
      var t = "dark";
      try { var s = localStorage.getItem("cnv.theme"); t = s || (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark"); } catch (e) {}
      document.documentElement.setAttribute("data-theme", t);
    })();
  </script>
  <link rel="stylesheet" href="/static/css/style.css?v=20260702-13">
  <style>
    html, body { margin: 0; height: 100%; background: var(--bg); }
    .rpw-empty { color: var(--muted); padding: 24px; font: 14px/1.5 system-ui, sans-serif; }
  </style>
</head>
<body>
  <div class="rpw-empty" id="rpw-empty">화면 제어 세션을 여는 중…</div>
  <script type="module" src="/static/js/remote-window.js?v=20260702-13"></script>
</body>
</html>
